<svg xmlns="http://www.w3.org/2000/svg" width="1260" height="760" viewBox="0 0 1260 760" role="img" aria-labelledby="title desc">
  <title id="title">Realtime Chat overall architecture</title>
  <desc id="desc">Simplified README architecture showing WebSocket STOMP authorization, Kafka publish by roomId, PostgreSQL recovery truth, Redis presence/cache/rate limit, receiver fan-out, reconnect sync, and DLT boundary.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <marker id="soft-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.4; }
      .zone { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.2; }
      .node { fill: #ffffff; stroke: #334155; stroke-width: 1.6; }
      .client { fill: #f8fafc; }
      .app { fill: #ecfeff; stroke: #0e7490; }
      .stream { fill: #fff7ed; stroke: #c2410c; }
      .consumer { fill: #f5f3ff; stroke: #6d28d9; }
      .redis { fill: #f0fdf4; stroke: #15803d; }
      .db { fill: #eef2ff; stroke: #4338ca; }
      .dlt { fill: #fef2f2; stroke: #b91c1c; }
      .arrow { fill: none; stroke: #334155; stroke-width: 2; marker-end: url(#arrow); }
      .softArrow { fill: none; stroke: #64748b; stroke-width: 1.8; stroke-dasharray: 6 5; marker-end: url(#soft-arrow); }
      .title { fill: #0f172a; font-family: Arial, sans-serif; font-size: 28px; font-weight: 700; }
      .subtitle { fill: #475569; font-family: Arial, sans-serif; font-size: 15px; }
      .label { fill: #0f172a; font-family: Arial, sans-serif; font-size: 17px; font-weight: 700; }
      .small { fill: #334155; font-family: Arial, sans-serif; font-size: 13px; }
      .tiny { fill: #475569; font-family: Arial, sans-serif; font-size: 12px; }
      .zoneLabel { fill: #475569; font-family: Arial, sans-serif; font-size: 13px; font-weight: 700; }
    </style>
  </defs>

  <rect class="bg" width="1260" height="760"/>
  <rect class="panel" x="30" y="30" width="1200" height="690" rx="16"/>

  <text class="title" x="60" y="74">Realtime Chat 전체 아키텍처</text>
  <text class="subtitle" x="60" y="102">WebSocket 연결, Kafka publish, DB persistence, receiver fan-out, reconnect recovery를 분리해 설명하는 구조도입니다.</text>

  <rect class="zone" x="60" y="136" width="220" height="520" rx="12"/>
  <text class="zoneLabel" x="82" y="166">Client boundary</text>

  <rect class="zone" x="320" y="136" width="260" height="520" rx="12"/>
  <text class="zoneLabel" x="342" y="166">Spring Boot app boundary</text>

  <rect class="zone" x="620" y="136" width="250" height="520" rx="12"/>
  <text class="zoneLabel" x="642" y="166">Kafka processing boundary</text>

  <rect class="zone" x="910" y="136" width="280" height="520" rx="12"/>
  <text class="zoneLabel" x="932" y="166">State and recovery boundary</text>

  <rect class="node client" x="94" y="278" width="152" height="78" rx="8"/>
  <text class="label" x="170" y="310" text-anchor="middle">Client</text>
  <text class="small" x="170" y="334" text-anchor="middle">WebSocket STOMP</text>

  <rect class="node app" x="354" y="190" width="192" height="76" rx="8"/>
  <text class="label" x="450" y="220" text-anchor="middle">WebSocket Endpoint</text>
  <text class="small" x="450" y="244" text-anchor="middle">CONNECT / SUBSCRIBE / SEND</text>

  <rect class="node app" x="354" y="302" width="192" height="76" rx="8"/>
  <text class="label" x="450" y="332" text-anchor="middle">STOMP Auth</text>
  <text class="small" x="450" y="356" text-anchor="middle">JWT + room membership</text>

  <rect class="node app" x="354" y="414" width="192" height="76" rx="8"/>
  <text class="label" x="450" y="444" text-anchor="middle">Message Producer</text>
  <text class="small" x="450" y="468" text-anchor="middle">ACK/NACK = Kafka publish</text>

  <rect class="node app" x="354" y="542" width="192" height="76" rx="8"/>
  <text class="label" x="450" y="572" text-anchor="middle">REST Chat Room API</text>
  <text class="small" x="450" y="596" text-anchor="middle">rooms / read state</text>

  <rect class="node stream" x="650" y="286" width="190" height="92" rx="8"/>
  <text class="label" x="745" y="318" text-anchor="middle">Kafka Topic</text>
  <text class="small" x="745" y="344" text-anchor="middle">chat.messages</text>
  <text class="small" x="745" y="366" text-anchor="middle">key = roomId</text>

  <rect class="node consumer" x="650" y="444" width="190" height="84" rx="8"/>
  <text class="label" x="745" y="476" text-anchor="middle">Kafka Consumer</text>
  <text class="small" x="745" y="500" text-anchor="middle">persist / fan-out paths</text>

  <rect class="node db" x="940" y="268" width="210" height="98" rx="8"/>
  <text class="label" x="1045" y="302" text-anchor="middle">PostgreSQL</text>
  <text class="small" x="1045" y="328" text-anchor="middle">Message / Room / Read State</text>
  <text class="small" x="1045" y="350" text-anchor="middle">reconnect recovery truth</text>

  <rect class="node redis" x="940" y="408" width="210" height="82" rx="8"/>
  <text class="label" x="1045" y="438" text-anchor="middle">Redis</text>
  <text class="small" x="1045" y="462" text-anchor="middle">Presence / Cache / Rate Limit</text>

  <rect class="node dlt" x="940" y="548" width="210" height="78" rx="8"/>
  <text class="label" x="1045" y="578" text-anchor="middle">DLT</text>
  <text class="small" x="1045" y="602" text-anchor="middle">failed consumer isolation</text>

  <rect class="node client" x="94" y="498" width="152" height="78" rx="8"/>
  <text class="label" x="170" y="528" text-anchor="middle">Reconnect Sync</text>
  <text class="small" x="170" y="552" text-anchor="middle">lastReceivedMessageId</text>

  <path class="arrow" d="M246 317 H300 V228 H354"/>
  <path class="arrow" d="M450 266 V302"/>
  <text class="tiny" x="462" y="288">authorize</text>
  <path class="arrow" d="M450 378 V414"/>
  <text class="tiny" x="462" y="402">SEND allowed</text>
  <path class="arrow" d="M546 452 H610 V332 H650"/>
  <text class="tiny" x="566" y="438">Kafka publish by roomId</text>
  <path class="arrow" d="M745 378 V444"/>
  <text class="tiny" x="760" y="414">consume</text>
  <path class="arrow" d="M840 468 H900 V317 H940"/>
  <path class="arrow" d="M246 537 H300 V580 H354"/>
  <path class="softArrow" d="M546 220 H890 V449 H940"/>
  <text class="tiny" x="656" y="208">presence heartbeat / disconnect</text>
  <path class="softArrow" d="M840 486 H900 V587 H940"/>

  <text class="small" x="60" y="688">Core: WebSocket connection, Kafka publish, DB persisted, receiver delivery are separate boundaries.</text>
  <text class="small" x="60" y="712">Redis Presence is ephemeral. PostgreSQL is the recovery truth for reconnect sync.</text>
</svg>
