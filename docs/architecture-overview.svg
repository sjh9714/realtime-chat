<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Realtime Chat system architecture overview</title>
  <desc id="desc">Client traffic enters Spring Boot apps, messages are published to Kafka by room id, persistence and broadcast consumers process messages, and failed persistence messages go to DLT for manual replay.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .band { fill: #eef2ff; stroke: #c7d2fe; stroke-width: 1; }
      .node { fill: #ffffff; stroke: #334155; stroke-width: 1.4; rx: 14; }
      .app { fill: #ecfeff; stroke: #0891b2; }
      .kafka { fill: #fff7ed; stroke: #ea580c; }
      .store { fill: #f0fdf4; stroke: #16a34a; }
      .dlt { fill: #fef2f2; stroke: #dc2626; }
      .label { fill: #0f172a; font-family: Inter, Arial, sans-serif; font-size: 16px; font-weight: 700; }
      .small { fill: #334155; font-family: Inter, Arial, sans-serif; font-size: 13px; }
      .tag { fill: #475569; font-family: Inter, Arial, sans-serif; font-size: 12px; font-weight: 700; }
      .arrow { fill: none; stroke: #334155; stroke-width: 1.7; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 6 6; }
      .section { fill: #475569; font-family: Inter, Arial, sans-serif; font-size: 13px; font-weight: 700; letter-spacing: .08em; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="640"/>
  <text class="label" x="44" y="44" font-size="24">Realtime Chat Architecture</text>
  <text class="small" x="44" y="70">Room membership, Kafka room ordering, DLT isolation, and Redis Pub/Sub broadcast across app instances.</text>

  <rect class="band" x="32" y="102" width="180" height="486" rx="18"/>
  <rect class="band" x="252" y="102" width="246" height="486" rx="18"/>
  <rect class="band" x="538" y="102" width="160" height="486" rx="18"/>
  <rect class="band" x="738" y="102" width="198" height="486" rx="18"/>
  <rect class="band" x="976" y="102" width="190" height="486" rx="18"/>

  <text class="section" x="58" y="130">CLIENT</text>
  <text class="section" x="278" y="130">APPLICATION</text>
  <text class="section" x="568" y="130">KAFKA</text>
  <text class="section" x="766" y="130">CONSUMERS</text>
  <text class="section" x="1004" y="130">STATE / BROADCAST</text>

  <rect class="node" x="60" y="255" width="124" height="78"/>
  <text class="label" x="93" y="287">Client</text>
  <text class="small" x="82" y="310">STOMP</text>
  <text class="small" x="73" y="328">WebSocket</text>

  <rect class="node app" x="288" y="173" width="174" height="88"/>
  <text class="label" x="317" y="204">Spring Boot</text>
  <text class="small" x="326" y="226">App instance 1</text>
  <text class="tag" x="326" y="247">authn / authz</text>

  <rect class="node app" x="288" y="378" width="174" height="72"/>
  <text class="label" x="317" y="410">Spring Boot</text>
  <text class="small" x="326" y="431">App instance 2</text>

  <rect class="node kafka" x="558" y="252" width="120" height="84"/>
  <text class="label" x="585" y="284">Kafka</text>
  <text class="small" x="574" y="306">chat.messages</text>
  <text class="tag" x="578" y="327">key = roomId</text>

  <rect class="node" x="766" y="169" width="142" height="76"/>
  <text class="label" x="784" y="199">Persistence</text>
  <text class="small" x="791" y="221">consumer group</text>

  <rect class="node" x="766" y="354" width="142" height="76"/>
  <text class="label" x="793" y="384">Broadcast</text>
  <text class="small" x="791" y="406">consumer group</text>

  <rect class="node store" x="1000" y="152" width="134" height="76"/>
  <text class="label" x="1032" y="183">PostgreSQL</text>
  <text class="small" x="1041" y="206">messages</text>

  <rect class="node store" x="1000" y="337" width="134" height="76"/>
  <text class="label" x="1024" y="368">Redis</text>
  <text class="small" x="1025" y="391">Pub/Sub</text>

  <rect class="node dlt" x="766" y="493" width="142" height="62"/>
  <text class="label" x="808" y="523">DLT</text>
  <text class="small" x="791" y="544">chat.messages.dlt</text>

  <rect class="node dlt" x="1000" y="493" width="134" height="62"/>
  <text class="label" x="1024" y="523">Manual</text>
  <text class="small" x="1024" y="544">replay utility</text>

  <rect class="node" x="1018" y="470" width="98" height="32" opacity="0"/>

  <path class="arrow" d="M184 294 C226 294 236 217 288 217"/>
  <text class="tag" x="200" y="240">CONNECT auth</text>
  <path class="arrow" d="M184 301 C226 301 236 410 288 410"/>
  <text class="tag" x="201" y="362">room topic broadcast</text>

  <path class="arrow" d="M462 217 C500 217 512 294 558 294"/>
  <text class="tag" x="482" y="244">SEND membership check</text>
  <text class="tag" x="494" y="264">publish key=roomId</text>

  <path class="arrow" d="M678 278 C716 246 728 207 766 207"/>
  <text class="tag" x="693" y="231">persistence group</text>
  <path class="arrow" d="M678 310 C716 342 728 392 766 392"/>
  <text class="tag" x="693" y="371">broadcast group</text>

  <path class="arrow" d="M908 207 H1000"/>
  <path class="arrow" d="M908 392 H1000"/>

  <path class="arrow" d="M1000 375 C925 375 920 414 908 414"/>
  <path class="arrow" d="M1000 375 C850 468 540 456 462 414"/>
  <text class="tag" x="505" y="455">WebSocket broadcast across app instances</text>

  <path class="arrow dashed" d="M837 245 V493"/>
  <text class="tag" x="848" y="300">failure</text>
  <path class="arrow dashed" d="M908 524 H1000"/>
  <text class="tag" x="925" y="514">manual replay</text>
  <path class="arrow dashed" d="M1000 538 C860 600 640 585 618 336"/>
</svg>
