<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="420" viewBox="0 0 1100 420" role="img" aria-labelledby="title desc">
  <title id="title">Realtime Chat system architecture overview</title>
  <desc id="desc">A simplified realtime chat architecture: Client connects to Spring Boot, messages are published to Kafka by room id, consumers persist to PostgreSQL or publish through Redis, and failures can be isolated to DLT for manual replay.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #f8fafc; stroke: #dbe3ef; stroke-width: 1; rx: 18; }
      .node { fill: #ffffff; stroke: #334155; stroke-width: 1.6; rx: 16; }
      .app { fill: #ecfeff; stroke: #0891b2; }
      .kafka { fill: #fff7ed; stroke: #ea580c; }
      .consumer { fill: #f5f3ff; stroke: #7c3aed; }
      .store { fill: #f0fdf4; stroke: #16a34a; }
      .dlt { fill: #fef2f2; stroke: #dc2626; }
      .title { fill: #0f172a; font-family: Inter, Arial, sans-serif; font-size: 28px; font-weight: 800; }
      .label { fill: #0f172a; font-family: Inter, Arial, sans-serif; font-size: 20px; font-weight: 800; }
      .small { fill: #334155; font-family: Inter, Arial, sans-serif; font-size: 15px; }
      .tag { fill: #475569; font-family: Inter, Arial, sans-serif; font-size: 13px; font-weight: 700; }
      .arrow { fill: none; stroke: #334155; stroke-width: 2; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 6 6; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1100" height="420"/>
  <rect class="panel" x="28" y="26" width="1044" height="368"/>

  <text class="title" x="56" y="68">Realtime Chat Architecture</text>
  <text class="small" x="56" y="96">The README view keeps only the reliability path: authorization, Kafka ordering, persistence, broadcast, and DLT replay.</text>

  <rect class="node" x="58" y="166" width="128" height="86"/>
  <text class="label" x="91" y="199">Client</text>
  <text class="small" x="79" y="225">STOMP</text>

  <rect class="node app" x="236" y="146" width="164" height="126"/>
  <text class="label" x="263" y="181">Spring Boot</text>
  <text class="small" x="260" y="210">JWT auth</text>
  <text class="small" x="260" y="232">SUBSCRIBE authz</text>
  <text class="small" x="260" y="254">SEND authz</text>

  <rect class="node kafka" x="452" y="166" width="148" height="86"/>
  <text class="label" x="497" y="199">Kafka</text>
  <text class="small" x="482" y="224">key = roomId</text>

  <rect class="node consumer" x="652" y="146" width="164" height="126"/>
  <text class="label" x="685" y="181">Consumers</text>
  <text class="small" x="683" y="212">Persistence</text>
  <text class="small" x="683" y="236">Broadcast</text>

  <rect class="node store" x="868" y="116" width="150" height="70"/>
  <text class="label" x="894" y="148">PostgreSQL</text>
  <text class="small" x="910" y="170">messages</text>

  <rect class="node store" x="868" y="226" width="150" height="70"/>
  <text class="label" x="901" y="258">Redis</text>
  <text class="small" x="899" y="280">Pub/Sub</text>

  <rect class="node" x="868" y="326" width="150" height="44"/>
  <text class="small" x="888" y="353">WebSocket broadcast</text>

  <rect class="node dlt" x="504" y="312" width="170" height="58"/>
  <text class="label" x="568" y="338">DLT</text>
  <text class="small" x="538" y="359">manual replay</text>

  <path class="arrow" d="M186 209 H236"/>
  <text class="tag" x="191" y="198">CONNECT / SEND</text>

  <path class="arrow" d="M400 209 H452"/>
  <text class="tag" x="404" y="198">publish</text>

  <path class="arrow" d="M600 209 H652"/>
  <text class="tag" x="601" y="198">consume</text>

  <path class="arrow" d="M816 188 C842 174 846 151 868 151"/>
  <text class="tag" x="824" y="160">save</text>

  <path class="arrow" d="M816 235 C840 246 846 261 868 261"/>
  <text class="tag" x="821" y="252">fan-out</text>

  <path class="arrow" d="M943 296 V326"/>
  <path class="arrow" d="M868 349 C710 408 260 398 122 252"/>

  <path class="arrow dashed" d="M526 252 V312"/>
  <text class="tag" x="536" y="288">failure</text>
  <path class="arrow dashed" d="M589 312 C580 286 574 264 560 252"/>
</svg>
