x-app-common: &app-common
  image: realtime-chat-product-app:demo
  build: .
  environment: &app-environment
    SPRING_PROFILES_ACTIVE: demo
    DB_HOST: postgres
    DB_PORT: 5432
    DB_USERNAME: chat
    DB_PASSWORD: ${CHAT_DB_PASSWORD:?CHAT_DB_PASSWORD is required}
    REDIS_HOST: redis
    REDIS_PORT: 6379
    KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
    CHAT_ALLOWED_ORIGINS: http://localhost:14173
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    kafka:
      condition: service_healthy
  healthcheck:
    test: ["CMD", "curl", "--fail", "http://localhost:8080/actuator/health"]
    interval: 5s
    timeout: 5s
    retries: 30
    start_period: 20s

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chat
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: ${CHAT_DB_PASSWORD:?CHAT_DB_PASSWORD is required}
    volumes:
      - demo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - demo_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  kafka:
    image: apache/kafka:3.9.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 8s
      retries: 20
      start_period: 20s

  app-1:
    <<: *app-common

  app-2:
    <<: *app-common

  gateway:
    image: nginx:1.27-alpine
    volumes:
      - ./docker/demo-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "18080:8080"
    depends_on:
      app-1:
        condition: service_healthy
      app-2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/gateway-health"]
      interval: 3s
      timeout: 3s
      retries: 20

  web:
    build:
      context: ./web
      args:
        VITE_API_URL: http://localhost:18080
        VITE_WS_URL: ws://localhost:18080/ws
        VITE_DEMO_MODE: "true"
    ports:
      - "14173:80"
    depends_on:
      gateway:
        condition: service_healthy

volumes:
  demo_postgres_data:
  demo_redis_data:
